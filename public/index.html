<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocMind AI - Тест</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .container { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        button { background: #4F46E5; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        input, textarea { width: 100%; padding: 8px; margin: 10px 0; }
        .result { background: #f5f5f5; padding: 10px; border-radius: 4px; white-space: pre-wrap; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🧪 DocMind AI - Тестирование API</h1>
    
    <div class="container">
        <h2>Статус сервера</h2>
        <div id="healthStatus">Проверка...</div>
    </div>

    <div class="container">
        <h2>Загрузка документа</h2>
        <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.docx">
        <button onclick="uploadFile()">Загрузить</button>
        <div id="uploadResult" class="result"></div>
    </div>

    <div class="container">
        <h2>Список документов</h2>
        <button onclick="loadDocuments()">Обновить список</button>
        <div id="documentsList" class="result"></div>
    </div>

    <script>
        async function checkHealth() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                document.getElementById('healthStatus').innerHTML = 
                    `<span class="success">✅ Сервер работает</span><br>
                     Uptime: ${Math.round(data.uptime)}с<br>
                     Время: ${new Date(data.timestamp).toLocaleString()}`;
            } catch (error) {
                document.getElementById('healthStatus').innerHTML = 
                    '<span class="error">❌ Сервер не отвечает</span>';
            }
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) {
                alert('Выберите файл');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                document.getElementById('uploadResult').innerHTML = 
                    `<span class="success">✅ Файл загружен!</span><br>
                     ${JSON.stringify(data, null, 2)}`;
                loadDocuments();
            } catch (error) {
                document.getElementById('uploadResult').innerHTML = 
                    `<span class="error">❌ Ошибка: ${error.message}</span>`;
            }
        }

        async function loadDocuments() {
            try {
                const res = await fetch('/api/documents');
                const data = await res.json();
                document.getElementById('documentsList').innerHTML = 
                    JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('documentsList').innerHTML = 
                    `<span class="error">❌ Ошибка: ${error.message}</span>`;
            }
        }

        // Проверяем здоровье при загрузке
        checkHealth();
    </script>
</body>
</html>
